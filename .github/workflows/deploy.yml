name: Tests & Deploy

on:
  push:
    branches: [main, master]
    paths:
      - "little-rocky/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "little-rocky/**"

jobs:
  # ── 1. Tests ────────────────────────────────────────────────────────────────
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: little-rocky/requirements.txt

      - name: Install dependencies
        working-directory: little-rocky
        run: |
          pip install --upgrade pip
          pip install requests python-dotenv scipy numpy rich pytest
          # py-clob-client is optional for tests (no API calls in test suite)

      - name: Run tests
        working-directory: little-rocky
        run: pytest --tb=short -q

  # ── 2. Deploy (uniquement sur push vers main/master) ────────────────────────
  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            echo "=== Déploiement Little Rocky $(date) ==="

            cd ${{ secrets.VPS_APP_PATH || '/opt/little-rocky' }}

            # Récupérer les derniers changements
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}

            # Activer le venv et mettre à jour les dépendances
            source .venv/bin/activate
            pip install --upgrade pip -q
            pip install -r little-rocky/requirements.txt -q

            # Redémarrer le service systemd
            sudo systemctl restart little-rocky
            sudo systemctl is-active --quiet little-rocky && echo "✓ Service redémarré OK" || echo "✗ Échec redémarrage"

            echo "=== Déploiement terminé ==="
